<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herning Engineering - 站点登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="login-logo-icon">🖥️</span>
                <h1>Herning Engineering</h1>
                <p class="login-subtitle">多平台服务器管理面板</p>
            </div>

            <!-- 首次初始化 -->
            <div id="initSection" style="display:none;">
                <div class="alert alert-info">
                    <p>🔐 <strong>首次访问</strong></p>
                    <p>请设置本站后台管理密码，用于登录管理面板。</p>
                    <p class="text-muted" style="font-size:0.8rem;margin-top:4px;">此密码仅用于进入管理网站，与魔方服务商账号无关。</p>
                </div>
                <div class="form-group">
                    <label for="initPassword">设置管理密码</label>
                    <input type="password" id="initPassword" placeholder="请输入管理密码（至少6位）" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="initConfirmPassword">确认管理密码</label>
                    <input type="password" id="initConfirmPassword" placeholder="请再次输入管理密码" autocomplete="new-password">
                </div>
                <div class="login-msg" id="initMsg"></div>
                <button class="btn btn-primary btn-block" id="btnInit" onclick="initAdminPassword()">设置密码并登录</button>
            </div>

            <!-- 正常登录 -->
            <div id="loginSection">
                <div class="form-group">
                    <label for="loginPassword">管理员密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入站点的管理密码" autocomplete="current-password">
                </div>
                <div class="login-msg" id="loginMsg"></div>
                <button class="btn btn-primary btn-block" id="btnLogin" onclick="doSiteLogin()">🔓 登录</button>
            </div>
        </div>
        <div class="login-footer">
            <p>🔐 多服务商管理面板 · 安全登录</p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/adminAuth.js"></script>
</body>
</html>
