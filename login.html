<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔方财务自动化开机管理平台 - 站点登录</title>
    <link rel="stylesheet" href="css/style.css?v=20260722m">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-mark">魔</div>
                <h1>魔方财务自动化开机管理平台</h1>
                <p class="login-subtitle">多平台服务器管理面板</p>
            </div>

            <!-- 首次初始化 -->
            <div id="initSection" style="display:none;">
                <div class="alert alert-info">
                    <p><strong>首次访问</strong></p>
                    <p>请设置本站后台管理密码。</p>
                    <p class="text-muted" style="font-size:0.8rem;margin-top:4px;">此密码仅用于进入管理网站，与魔方服务商账号无关。</p>
                </div>
                <div class="form-group">
                    <label for="initPassword">请输入密码：</label>
                    <input type="password" id="initPassword" placeholder="至少 6 位" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="initConfirmPassword">请确认密码：</label>
                    <input type="password" id="initConfirmPassword" placeholder="再次输入密码" autocomplete="new-password">
                </div>
                <div class="login-msg" id="initMsg"></div>
                <button class="btn btn-primary btn-block" id="btnInit" onclick="initAdminPassword()">设置密码并登录</button>
            </div>

            <!-- 正常登录 -->
            <div id="loginSection">
                <div class="form-group login-password-group">
                    <label for="loginPassword">请输入密码：</label>
                    <input type="password" id="loginPassword" placeholder="请输入管理密码" autocomplete="current-password" autofocus>
                </div>
                <div class="login-msg" id="loginMsg"></div>
                <button class="btn btn-primary btn-block" id="btnLogin" onclick="doSiteLogin()">登录</button>
            </div>
        </div>
        <div class="login-footer">
            <p>多服务商管理面板 · 安全登录</p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js?v=20260722m"></script>
    <script src="js/adminAuth.js?v=20260722m"></script>
</body>
</html>
