<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herning Engineering - 服务商管理</title>
    <link rel="stylesheet" href="css/style.css?v=20260722m">
</head>
<body class="admin-page">
    <!-- 顶部导航栏 -->
    <header class="topbar">
        <div class="topbar-inner">
            <span class="logo">🖥️ Herning Engineering · 服务商管理</span>
            <div class="topbar-actions">
                <a href="index.html" class="btn btn-sm btn-outline">📋 服务器面板</a>
                <button class="btn btn-sm btn-outline" onclick="logoutSite()">🔒 登出</button>
            </div>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="container admin-container">
        <!-- 左侧：服务商列表 -->
        <aside class="sidebar admin-sidebar">
            <div class="panel">
                <div class="panel-header">
                    <h2>🏢 服务商管理</h2>
                    <button class="btn btn-sm btn-primary" onclick="openProviderForm()">+ 新增</button>
                </div>
                <div class="provider-list" id="providerList">
                    <div class="empty-state"><p>暂无服务商配置</p></div>
                </div>
            </div>

            <div class="panel">
                <h2>⚙️ 管理</h2>
                <div class="batch-buttons">
                    <button class="btn btn-outline btn-sm btn-block" onclick="openChangePasswordDialog()">🔑 修改管理密码</button>
                </div>
            </div>
        </aside>

        <!-- 右侧：服务商详情 / 编辑 -->
        <main class="main-content">
            <div id="detailEmpty" class="panel">
                <div class="empty-state">
                    <p>👈 请选择一个服务商查看详情，或新增服务商</p>
                </div>
            </div>

            <div id="detailPanel" class="panel" style="display:none;">
                <div class="panel-header">
                    <h2 id="detailTitle">服务商详情</h2>
                    <div class="panel-header-right">
                        <button class="btn btn-sm btn-primary" id="btnEdit" onclick="editCurrentProvider()">✏️ 编辑</button>
                        <button class="btn btn-sm btn-success" id="btnActivate" onclick="activateProvider()">✅ 设为活跃</button>
                        <button class="btn btn-sm btn-danger" id="btnDelete" onclick="deleteCurrentProvider()">🗑️ 删除</button>
                    </div>
                </div>
                <div class="provider-detail" id="providerDetail"></div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑服务商弹窗 -->
    <div class="modal-overlay" id="providerModalOverlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="providerModalTitle">新增服务商</h3>
                <button class="modal-close" onclick="closeProviderForm()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="providerName">服务商名称 *</label>
                    <input type="text" id="providerName" placeholder="如：魔方财务主站">
                </div>
                <div class="form-group">
                    <label for="providerUrl">API 地址 *</label>
                    <input type="text" id="providerUrl" placeholder="如：https://www.heyunidc.cn/v1/">
                </div>
                <div class="form-group">
                    <label for="providerAccount">登录账号</label>
                    <input type="text" id="providerAccount" placeholder="手机号或邮箱">
                </div>
                <div class="form-group">
                    <label for="providerApiKey">API 密钥</label>
                    <input type="password" id="providerApiKey" placeholder="API Key">
                </div>
                <div class="form-group">
                    <label for="providerNotes">备注</label>
                    <input type="text" id="providerNotes" placeholder="可选备注信息">
                </div>
                <div class="login-msg" id="providerFormMsg"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeProviderForm()">取消</button>
                <button class="btn btn-primary" id="btnSaveProvider" onclick="saveProvider()">保存</button>
            </div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal-overlay" id="changePasswordOverlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>🔑 修改管理密码</h3>
                <button class="modal-close" onclick="closeChangePasswordDialog()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="oldPasswordInput">原密码</label>
                    <input type="password" id="oldPasswordInput" placeholder="请输入原密码">
                </div>
                <div class="form-group">
                    <label for="newPasswordInput">新密码</label>
                    <input type="password" id="newPasswordInput" placeholder="请输入新密码（至少6位）">
                </div>
                <div class="form-group">
                    <label for="confirmPasswordInput">确认新密码</label>
                    <input type="password" id="confirmPasswordInput" placeholder="请再次输入新密码">
                </div>
                <div class="login-msg" id="changePasswordMsg"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeChangePasswordDialog()">取消</button>
                <button class="btn btn-primary" id="btnChangePassword" onclick="doChangePassword()">确认修改</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js?v=20260722m"></script>
    <script src="js/adminAuth.js?v=20260722m"></script>
    <script src="js/providerMgr.js?v=20260722m"></script>
</body>
</html>
